# Meal-AI — CI шаблона: линт shell-скриптов, python-тесты, shell-тесты.
# Тесты гоняют реальные скрипты на песочницах (MEAL_AI_DIR), без API и claude.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck scripts/*.sh tests/shell/*.sh

      - name: python syntax
        run: python3 -m compileall -q scripts

      - name: python tests
        run: python3 -m unittest discover tests -v

      - name: shell tests
        run: bash tests/shell/run.sh
